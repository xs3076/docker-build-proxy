name: Manual Build & Push to Aliyun

on:
  workflow_dispatch:
    inputs:
      image_folder:
        description: '项目文件夹 (需包含 Dockerfile)'
        required: true
        type: choice
        options:
          - java-fonts
          - python-base
          - node-runtime
      image_tag:
        description: '镜像版本号'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 登录阿里云 (使用你之前的 Secrets)
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. 构建并推送
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # 上下文只指向选中的文件夹，构建更快
          context: ./${{ github.event.inputs.image_folder }}
          file: ./${{ github.event.inputs.image_folder }}/Dockerfile
          push: true
          # 自动生成 Tag：阿里云地址/命名空间/文件夹名:版本号
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/songxuan/${{ github.event.inputs.image_folder }}:${{ github.event.inputs.image_tag }}
            ${{ secrets.ALIYUN_REGISTRY }}/songxuan/${{ github.event.inputs.image_folder }}:latest
          # 开启缓存，下次构建相同步骤（如安装包）会飞快
          cache-from: type=gha
          cache-to: type=gha,mode=max