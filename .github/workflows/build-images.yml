name: Manual Build & Push (Flexible Folder)

on:
  workflow_dispatch:
    inputs:
      image_folder:
        description: '请输入要构建的文件夹名称 (例如: java-fonts)'
        required: true
        type: string  # 修改为 string，支持手动输入
      image_tag:
        description: '镜像版本号'
        required: true
        default: 'latest'
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # 使用用户手动输入的文件夹路径
          context: ./${{ github.event.inputs.image_folder }}
          file: ./${{ github.event.inputs.image_folder }}/Dockerfile
          push: true
          # 镜像名会根据你填写的文件夹名动态生成
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/songxuan/${{ github.event.inputs.image_folder }}:${{ github.event.inputs.image_tag }}
            ${{ secrets.ALIYUN_REGISTRY }}/songxuan/${{ github.event.inputs.image_folder }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
